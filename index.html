<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Payment Checkout Form</title>
	<link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.4.2/css/all.css">
	<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="wrapper">
  <div class="payment">
    <div class="payment-logo">
      <p>p</p>
    </div>
    <h2>Payment Gateway</h2>
    <div class="form">
      <div class="card space icon-relative">
        <label class="label">Card holder:</label>
        <input type="text" id="card_holder" class="input" placeholder="Coding Market" maxlength="100" required>
        <i class="fas fa-user"></i>
      </div>
      <div class="card space icon-relative">
        <label class="label">Card number:</label>
        <input type="text" id="card_number" class="input" data-mask="0000 0000 0000 0000" placeholder="Card Number" maxlength="19" required>
        <i class="far fa-credit-card"></i>
      </div>
      <div class="card-grp space">
        <div class="card-item icon-relative">
          <label class="label">Expiry date:</label>
          <input type="text" id="expiry_date" class="input" data-mask="00 / 00" placeholder="00 / 00" required>
          <i class="far fa-calendar-alt"></i>
        </div>
        <div class="card-item icon-relative">
          <label class="label">CVC:</label>
          <input type="text" id="cvc" class="input" data-mask="000" placeholder="000" required>
          <i class="fas fa-lock"></i>
        </div>
      </div>
      <div class="btn">
        <form action="success.php" method="POST">
          <button type="submit" id="pay_button" disabled>Pay</button>
        </form>
      </div> 
    </div>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.3.1.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.15/jquery.mask.min.js"></script>
<script>
  // Function to check if all fields are filled
  function validateForm() {
    const cardHolder = document.getElementById('card_holder').value.trim();
    const cardNumber = document.getElementById('card_number').value.trim();
    const expiryDate = document.getElementById('expiry_date').value.trim();
    const cvc = document.getElementById('cvc').value.trim();

    // Enable the button only if all fields are filled
    const payButton = document.getElementById('pay_button');
    if (cardHolder && cardNumber && expiryDate && cvc) {
      payButton.disabled = false;
    } else {
      payButton.disabled = true;
    }
  }

  // Attach event listeners to input fields
  document.querySelectorAll('.input').forEach(input => {
    input.addEventListener('input', validateForm);
  });
</script>
</body>
</html>
